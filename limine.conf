# ============================================================
#  Quanta OS — Limine Boot Configuration
#  Compatible with Limine 8.x
# ============================================================

interface_resolution: 640x480
interface_background_style: blank
timeout: 3
theme_colours: 2;0x1a1a2e;0x00d4ff;0x00d4ff;0xff6b6b;0xffffff;0xaaaaaa

/Quanta OS
    protocol: limine
    path: boot():/boot/quanta.elf
    kaslr: no
    cmdline: loglevel=info serial=on
